stages:
  - build
  - release

build-linux:
  stage: build
  image: node:20
  only:
    - tags
    - 
  before_script:
    - apt-get update && apt-get install -y libarchive-tools fakeroot rpm zip
  script:
    - npm ci
    - npm run dist -- --linux
    - appimage=$(find dist -name "*.AppImage" | head -1)
    - zip -j dist/GeoCreuse_LocalSave_Linux.zip "$appimage"
  artifacts:
    paths:
      - dist/GeoCreuse_LocalSave_Linux.zip
    expire_in: 1 hour

build-windows:
  stage: build
  image: electronuserland/builder:wine
  only:
    - tags
    - main
  before_script:
    - apt-get update && apt-get install -y zip
  script:
    - npm ci
    - npm run dist -- --win
    - exe=$(find dist -name "geocreuse-desktop*.exe" | grep -v elevate | head -1)
    - "echo 'EXE trouvé : $exe'"
    - zip -j dist/GeoCreuse_LocalSave_Windows.zip "$exe"
  artifacts:
    paths:
      - dist/GeoCreuse_LocalSave_Windows.zip
    expire_in: never

# ── Release GitLab ────────────────────────────────────────
release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  only:
    - tags
  needs:
    - build-linux
    - build-windows
  script:
    - echo "Publishing release $CI_COMMIT_TAG"
  release:
    tag_name: $CI_COMMIT_TAG
    name: "Release $CI_COMMIT_TAG"
    description: "Release automatique — $CI_COMMIT_TAG"
    assets:
      links:
        - name: "GeoCreuse_LocalSave_Linux.zip"
          url: "$CI_PROJECT_URL/-/jobs/artifacts/$CI_COMMIT_TAG/raw/dist/GeoCreuse_LocalSave_Linux.zip?job=build-linux"
          link_type: package
        - name: "GeoCreuse_LocalSave_Windows.zip"
          url: "$CI_PROJECT_URL/-/jobs/artifacts/$CI_COMMIT_TAG/raw/dist/GeoCreuse_LocalSave_Windows.zip?job=build-windows"
          link_type: package