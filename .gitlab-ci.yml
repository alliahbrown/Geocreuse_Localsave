stages:
  - build
  - release

build-linux:
  stage: build
  image: node:20
  only:
    - tags
  before_script:
    - apt-get update && apt-get install -y libarchive-tools fakeroot rpm zip
  script:
    - npm ci
    - npm run dist -- --linux
    - appimage=$(find dist -name "*.AppImage" | head -1)
    - zip -j dist/GeoCreuse_LocalSave_Linux.zip "$appimage"
  artifacts:
    paths:
      - dist/GeoCreuse_LocalSave_Linux.zip
    expire_in: 1 hour

build-windows:
  stage: build
  image: electronuserland/builder:wine
  only:
    - tags
    - main
  before_script:
    - apt-get update && apt-get install -y zip
  script:
    - npm ci
    - npm run dist -- --win --dir
    - file dist/win-unpacked/geocreuse-desktop.exe
    - ls -lah dist/win-unpacked/
  artifacts:
    paths:
      - dist/GeoCreuse_LocalSave_Windows.zip
    expire_in: never

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  only:
    - tags
  needs:
    - build-linux
    - build-windows
  script:
    - echo "Publishing release $CI_COMMIT_TAG"
  release:
    tag_name: $CI_COMMIT_TAG
    name: "Release $CI_COMMIT_TAG"
    description: "Release automatique — $CI_COMMIT_TAG"
    assets:
      links:
        - name: "GeoCreuse_LocalSave_Linux.zip"
          url: "$CI_PROJECT_URL/-/jobs/artifacts/$CI_COMMIT_TAG/raw/dist/GeoCreuse_LocalSave_Linux.zip?job=build-linux"
          link_type: package
        - name: "GeoCreuse_LocalSave_Windows.zip"
          url: "$CI_PROJECT_URL/-/jobs/artifacts/$CI_COMMIT_TAG/raw/dist/GeoCreuse_LocalSave_Windows.zip?job=build-windows"
          link_type: package

mirror-to-github:
  stage: deploy
  script:
    - git remote add github https://alliahbrown:$TOKEN@github.com/alliahbrown/Geocreuse_Localsave.git
    - git push github HEAD:main --force
    - git push github --tags
  only:
    - main
    - tags