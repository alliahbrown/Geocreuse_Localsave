stages:
  - build
  - release

# ── Build Linux ──────────────────────────────────────────
build-linux:
  stage: build
  image: node:20
  only:
    - tags
  before_script:
    - apt-get update && apt-get install -y libarchive-tools fakeroot rpm
  script:
    - npm ci
    - npm run dist -- --linux
    - appimage=$(find dist -name "*.AppImage" | head -1)
    - zip -j dist/GeoCreuse_LocalSave_Linux.zip "$appimage"
  artifacts:
    paths:
      - dist/GeoCreuse_LocalSave_Linux.zip
    expire_in: 1 hour

# ── Build Windows (cross-compile via Wine) ────────────────
build-windows:
  stage: build
  image: electronuserland/builder:wine
  only:
    - tags
  script:
    - npm ci
    - npm run dist -- --win
    - exe=$(find dist -name "*.exe" | head -1)
    - zip -j dist/GeoCreuse_LocalSave_Windows.zip "$exe"
  artifacts:
    paths:
      - dist/GeoCreuse_LocalSave_Windows.zip
    expire_in: 1 hour

# ── Release GitLab ────────────────────────────────────────
release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  only:
    - tags
  needs:
    - build-linux
    - build-windows
  script:
    - echo "Publishing release $CI_COMMIT_TAG"
  release:
    tag_name: $CI_COMMIT_TAG
    name: "Release $CI_COMMIT_TAG"
    description: "Release automatique — $CI_COMMIT_TAG"
    assets:
      links:
        - name: "MonApp-Linux.zip"
          url: "$CI_PROJECT_URL/-/jobs/artifacts/$CI_COMMIT_TAG/raw/dist/MonApp-Linux.zip?job=build-linux"
        - name: "MonApp-Windows.zip"
          url: "$CI_PROJECT_URL/-/jobs/artifacts/$CI_COMMIT_TAG/raw/dist/MonApp-Windows.zip?job=build-windows"